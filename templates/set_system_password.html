{% extends "base.html" %}
{% block title %}تعيين الرقم السري{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:auto">
  <h2 style="color:#1a3d2f;margin-bottom:20px">🔑 {{ 'تغيير' if has_password else 'تعيين' }} الرقم السري للنظام</h2>
  <form method="POST">
    {% if has_password %}
    <div class="form-group">
      <label>الرقم السري الحالي</label>
      <input type="password" name="current_password" required style="text-align:center;letter-spacing:3px">
    </div>
    {% endif %}
    <div class="form-group">
      <label>الرقم السري الجديد</label>
      <input type="password" name="new_password" required minlength="4" style="text-align:center;letter-spacing:3px;font-size:18px">
    </div>
    <div class="form-group">
      <label>تأكيد الرقم السري الجديد</label>
      <input type="password" name="confirm_password" required minlength="4" style="text-align:center;letter-spacing:3px;font-size:18px">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">💾 حفظ</button>
  </form>
  <div style="margin-top:15px;text-align:center">
    <a href="{{ url_for('admin_users') }}" class="btn btn-danger btn-sm">❌ رجوع</a>
  </div>
</div>
{% endblock %}
